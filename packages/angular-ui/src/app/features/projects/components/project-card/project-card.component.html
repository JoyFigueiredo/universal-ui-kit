<div class="project">
    <img [src]="image" class="project-image" />

    <span class="project-category">
        {{ category }}
    </span>

    <h3 class="project-title">
        {{ title }}
    </h3>

    <div class="project-technologies">
        <span *ngFor="let tech of technologies">
            {{ tech }}
        </span>
    </div>

    <p class="project-description">
        {{ description }}
    </p>

    <ui-button label="GitHub" icon="fa-brands fa-github" (action)="verProjeto()">
    </ui-button>

</div>
